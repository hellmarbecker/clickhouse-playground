global
    # macOS: use UDP — /dev/log does not exist on macOS
    # For local dev you can swap this for: log stdout format raw local0 info
    log 127.0.0.1:514 local0 info
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_in
    bind *:9096

    # Capture headers for use in log-format
    capture request header Host          len 64
    capture request header User-Agent    len 128
    capture request header Content-Type  len 64
    capture request header Content-Length len 16

    # Structured JSON log format
    # Note: HAProxy cannot capture the raw body natively;
    # the body is captured via the 'capture' ACL + req.body below.
    log-format {"timestamp":"%tiso","client":"%ci:%cp","method":"%HM","path":"%HP","query":"%HQ","version":"%HV","status":%ST,"bytes_read":%B,"request_time_ms":%Tr,"host":"%[capture.req.hdr(0)]","user_agent":"%[capture.req.hdr(1)]","content_type":"%[capture.req.hdr(2)]","content_length":"%[capture.req.hdr(3)]","body":"%[var(req.body_preview)]"}

    # Buffer enough of the request body to log it (tune as needed)
    option http-buffer-request
    http-request set-var(req.body_preview) req.body if METH_POST

    default_backend local_backend

backend local_backend
    server local localhost:9095 check
